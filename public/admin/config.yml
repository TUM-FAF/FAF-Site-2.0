backend:
  name: github
  repo: TUM-FAF/FAF-Site-2.0
  branch: master
  base_url: https://api.netlify.com
  auth_endpoint: auth

media_folder: new_site/public/uploads
public_folder: /uploads

collections:
  - name: events
    label: Events
    folder: new_site/src/content/events
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    view_filters:
      - label: Drafts
        field: draft
        pattern: true
      - label: Published
        field: draft
        pattern: false
    view_groups:
      - label: Status
        field: draft
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Description, name: description, widget: text }
      - { label: Venue, name: venue, widget: string, required: false }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false, required: false }

  - name: team
    label: Team Members
    folder: new_site/src/content/team
    create: true
    slug: "{{slug}}"
    summary: "{{name}}"
    view_filters:
      - label: Drafts
        field: draft
        pattern: true
      - label: Published
        field: draft
        pattern: false
    view_groups:
      - label: Status
        field: draft
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Role, name: role, widget: string }
      - { label: Photo, name: photo, widget: image, required: false }
      - { label: Bio, name: bio, widget: text, required: false }
      - { label: Sort Order, name: sort_order, widget: number, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false, required: false }

  - name: testimonials
    label: Testimonials
    folder: new_site/src/content/testimonials
    create: true
    slug: "{{slug}}"
    summary: "{{author}}"
    view_filters:
      - label: Drafts
        field: draft
        pattern: true
      - label: Published
        field: draft
        pattern: false
    view_groups:
      - label: Status
        field: draft
    fields:
      - { label: Author, name: author, widget: string }
      - { label: Event, name: event, widget: string }
      - { label: Quote, name: quote, widget: text }
      - { label: Sort Order, name: sort_order, widget: number, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false, required: false }

  - name: partners
    label: Partners
    folder: new_site/src/content/partners
    create: true
    slug: "{{slug}}"
    summary: "{{name}}"
    view_filters:
      - label: Drafts
        field: draft
        pattern: true
      - label: Published
        field: draft
        pattern: false
    view_groups:
      - label: Status
        field: draft
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Logo, name: logo, widget: image }
      - { label: Website, name: url, widget: string, required: false }
      - { label: Large logo, name: large, widget: boolean, default: false, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false, required: false }

  - name: gallery
    label: Gallery
    folder: new_site/src/content/gallery
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    view_filters:
      - label: Drafts
        field: draft
        pattern: true
      - label: Published
        field: draft
        pattern: false
    view_groups:
      - label: Status
        field: draft
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Image, name: image, widget: image }
      - { label: Caption, name: caption, widget: string, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false, required: false }

  - name: roles
    label: Volunteer Roles
    folder: new_site/src/content/roles
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    view_filters:
      - label: Drafts
        field: draft
        pattern: true
      - label: Published
        field: draft
        pattern: false
    view_groups:
      - label: Status
        field: draft
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Apply Link, name: apply_link, widget: string, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false, required: false }

  - name: tiers
    label: Sponsorship Tiers
    folder: new_site/src/content/tiers
    create: true
    slug: "{{slug}}"
    summary: "{{name}}"
    view_filters:
      - label: Drafts
        field: draft
        pattern: true
      - label: Published
        field: draft
        pattern: false
    view_groups:
      - label: Status
        field: draft
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Description, name: description, widget: text }
      - label: Benefits
        name: benefits
        widget: list
        field: { label: Benefit, name: benefit, widget: string }
      - { label: CTA Label, name: cta_label, widget: string }
      - { label: Featured (Most Popular), name: featured, widget: boolean, default: false, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false, required: false }

  - name: upcoming-event
    label: Upcoming Event
    files:
      - label: Upcoming Event Settings
        name: upcoming-event
        file: new_site/src/content/upcoming-event/index.md
        fields:
          - { label: Event Title, name: title, widget: string }
          - { label: Tagline, name: tagline, widget: string }
          - { label: Description, name: description, widget: text }
          - { label: Extra Description, name: description_extra, widget: text, required: false }
          - { label: Date, name: date, widget: string, hint: 'e.g. June 20–21, 2026' }
          - { label: Start Time, name: start_time, widget: string, hint: 'e.g. 10:00 AM' }
          - { label: Duration, name: duration, widget: string, hint: 'e.g. 24 hours' }
          - { label: Location, name: location, widget: string }
          - { label: Address, name: address, widget: string, required: false }
          - { label: Format, name: format, widget: string, hint: 'e.g. In-person, Hybrid, Online' }
          - { label: People Section Label, name: people_label, widget: select, options: [Mentors, Speakers, Judges, 'Speakers & Mentors'], hint: 'Label shown above the people section' }
          - { label: Banner Image, name: banner, widget: image, required: false, hint: 'Upload the event banner (replaces the previous one)' }
          - { label: Show Agenda, name: show_agenda, widget: boolean, default: false, hint: 'Toggle on when the agenda is ready to publish' }
          - { label: Show People (Mentors/Speakers), name: show_people, widget: boolean, default: false, hint: 'Toggle on when the full list is confirmed' }
          - { label: Show Sponsors, name: show_sponsors, widget: boolean, default: false, hint: 'Toggle on when sponsors are confirmed' }
          - label: Agenda
            name: agenda
            widget: list
            fields:
              - { label: Time, name: time, widget: string, hint: 'e.g. 10:00' }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: desc, widget: text }
          - label: People
            name: people
            widget: list
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Role, name: role, widget: string, hint: 'e.g. Mentor — FinTech, Keynote Speaker' }
              - { label: Company, name: company, widget: string, required: false }
              - { label: Photo, name: photo, widget: image, required: false }
          - label: Sponsors
            name: sponsors
            widget: list
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Logo, name: logo, widget: image, required: false }
              - { label: Large logo, name: large, widget: boolean, default: false, required: false }

  - name: home
    label: Home Page
    files:
      - label: Home Settings
        name: home
        file: new_site/src/content/home/index.md
        fields:
          - { label: Hero Tagline, name: hero_tagline, widget: string }
          - { label: Hero Title, name: hero_title, widget: string }
          - { label: Hero Subtitle, name: hero_subtitle, widget: text }
          - { label: Next Event Title, name: next_event_title, widget: string }
          - { label: Next Event Date, name: next_event_date, widget: string }
          - { label: Next Event Description, name: next_event_description, widget: text }
          - { label: Next Event Location, name: next_event_location, widget: string }
          - { label: Meeting Heading, name: meeting_heading, widget: string }
          - { label: Meeting Subtitle, name: meeting_subtitle, widget: text }
