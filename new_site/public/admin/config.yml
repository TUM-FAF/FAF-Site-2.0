backend:
  name: git-gateway
  branch: master

media_folder: new_site/public/uploads
public_folder: /uploads

collections:
  - name: events
    label: Events
    folder: new_site/src/content/events
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Description, name: description, widget: text }
      - { label: Image, name: image, widget: image, required: false }

  - name: team
    label: Team Members
    folder: new_site/src/content/team
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Role, name: role, widget: string }
      - { label: Photo, name: photo, widget: image, required: false }
      - { label: Bio, name: bio, widget: text, required: false }

  - name: testimonials
    label: Testimonials
    folder: new_site/src/content/testimonials
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Author, name: author, widget: string }
      - { label: Event, name: event, widget: string }
      - { label: Quote, name: quote, widget: text }

  - name: partners
    label: Partners
    folder: new_site/src/content/partners
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Logo, name: logo, widget: image }
      - { label: Website, name: url, widget: string, required: false }

  - name: gallery
    label: Gallery
    folder: new_site/src/content/gallery
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Image, name: image, widget: image }
      - { label: Caption, name: caption, widget: string, required: false }
